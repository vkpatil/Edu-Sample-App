name: Django DB Migration Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "**/migrations/*.py"
      - "**/models.py"
      - "config/settings.py"
      - "manage.py"
      - "requirements.txt"
  push:
    branches: [main]
    paths:
      - "**/migrations/*.py"
      - "**/models.py"
      - "config/settings.py"
      - "manage.py"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub environment for migration deployment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
      apply:
        description: "Apply migrations to target database"
        type: boolean
        required: true
        default: false

env:
  PYTHON_VERSION: "3.13"

jobs:
  migration_validation:
    name: Validate Django Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edusys
          POSTGRES_USER: edusys
          POSTGRES_PASSWORD: edusys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edusys -d edusys"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: migration-validation-secret
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: edusys
      POSTGRES_USER: edusys
      POSTGRES_PASSWORD: edusys
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for missing migration files
        run: python manage.py makemigrations --check --dry-run

      - name: Show migration execution plan
        run: python manage.py migrate --plan

  deploy_migrations:
    name: Apply Django Migrations
    runs-on: ubuntu-latest
    needs: migration_validation
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    environment:
      name: ${{ inputs.environment }}

    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "0"
      ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput
