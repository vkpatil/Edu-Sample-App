name: Django CI/CD to Azure Web App

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  ci:
    name: Test Django App
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edusys
          POSTGRES_USER: edusys
          POSTGRES_PASSWORD: edusys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edusys -d edusys"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: github-actions-ci-secret
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: edusys
      POSTGRES_USER: edusys
      POSTGRES_PASSWORD: edusys
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: ${{ steps.deploy-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        id: deploy-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
